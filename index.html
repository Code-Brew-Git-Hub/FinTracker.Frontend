<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="container header-inner">

        <div class="logo" onclick="window.location.href='index.html'">
            <img src="img/fintracker_logo_header.png" class="logo-img" alt="FinTracker">
            <span>FinTracker</span>
        </div>

        <div class="right-menu">
            <nav class="nav">
                <a class="active">Главная</a>
                <a class="go-transactions">Транзакции</a>
                <a>Аналитика</a>
                <a>О нас</a>
            </nav>

            <button class="btn open-upload">Загрузить</button>
        </div>

    </div>
</header>

<section class="hero">
    <div class="container hero-inner">

        <div class="left">
            <h1>
                Хотите<br>
                разобраться<br>
                с тратами?
            </h1>

            <p class="subtext">
                It is a long established fact that a<br>
                reader will be distracted by
            </p>

            <button class="btn big open-upload">
                Загрузить выписку
            </button>

            <ul class="list">
                <li>Связывайте транзакции</li>
                <li>Исключайте переводы из аналитики</li>
                <li>Создавайте категории</li>
            </ul>
        </div>

        <div class="right">
            <img src="img/scheme.png" class="scheme" alt="Схема">
        </div>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
