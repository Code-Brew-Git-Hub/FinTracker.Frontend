<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <header class="header">
        <div class="logo">
            <img src="img/logo.png" alt="FinTracker">

        <div class="hero-image">
            <img src="img/wallet.png" alt="wallet">
